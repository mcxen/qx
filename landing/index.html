<html lang="zh-CN">
  <head>

    <meta
      property="og:description"
      content="一次快捷键，连接搜索、剪贴板、AI、RSS、插件与桌面自动化。"
    />
    <meta name="theme-color" content="#1e1e1e" />
    <title>Qx — 桌面效率入口</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231e1e1e'/%3E%3Ctext x='16' y='21' text-anchor='middle' font-family='Arial' font-size='14' font-weight='700' fill='white'%3EQx%3C/text%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,300;0,400;0,500;0,700;0,800;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #1e1e1e;
        --text: #fff;
        --text-muted: rgba(255, 255, 255, 0.72);
        --text-soft: rgba(255, 255, 255, 0.48);
        --dark-text: #22282b;
        --page-pad: clamp(24px, 3.4vw, 50px);
        --button-radius: 10px;
        --card-radius: 5px;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        min-width: 1024px;
        scroll-behavior: smooth;
      }

      body {
        min-width: 1024px;
        background: var(--bg);
        color: var(--text);
        font-family: "Inter Tight", "PingFang SC", "Microsoft YaHei", sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      img {
        display: block;
        max-width: 100%;
      }

      button {
        border: 0;
        background: none;
        color: inherit;
        font: inherit;
        cursor: pointer;
      }

      .hero {
        position: relative;
        width: 100%;
        height: 100vh;
        min-height: 700px;
        overflow: hidden;
        isolation: isolate;
        background: var(--bg);
      }

      .hero__bg,
      .hero__overlay,
      .hero__grain {
        position: absolute;
        inset: 0;
      }

      .hero__bg {
        z-index: 0;
        overflow: hidden;
      }

      .hero__video {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 60%;
        height: 90%;
        object-fit: cover;
        transform: translate(-50%, -50%) scale(1.9);
        filter: saturate(0.7) contrast(0.98) brightness(1.08) hue-rotate(-32deg);
      }

      .hero__overlay {
        z-index: 1;
        pointer-events: none;
        background:
          radial-gradient(circle at 48% 38%, rgba(220, 242, 255, 0.12) 0%, transparent 42%),
          linear-gradient(125deg, rgba(166, 216, 246, 0.3), rgba(82, 146, 198, 0.2)),
          radial-gradient(circle at 48% 40%, transparent 10%, rgba(7, 19, 31, 0.18) 70%),
          rgba(7, 18, 30, 0.2);
      }

      .hero__grain {
        z-index: 2;
        pointer-events: none;
        opacity: 0.12;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.22'/%3E%3C/svg%3E");
        mix-blend-mode: soft-light;
      }

      .hero__gradient-top,
      .hero__gradient-bottom {
        display: none;
      }

      .hero__blur {
        position: absolute;
        right: 0;
        bottom: 0;
        left: 0;
        z-index: 3;
        height: 28%;
        pointer-events: none;
      }

      .hero__blur-layer {
        position: absolute;
        inset: 0;
      }

      .hero__blur-layer:nth-child(1) { backdrop-filter: blur(0.6px); mask-image: linear-gradient(to bottom, transparent 0%, black 12%); }
      .hero__blur-layer:nth-child(2) { backdrop-filter: blur(1px); mask-image: linear-gradient(to bottom, transparent 12%, black 25%); }
      .hero__blur-layer:nth-child(3) { backdrop-filter: blur(1.5px); mask-image: linear-gradient(to bottom, transparent 25%, black 37%); }
      .hero__blur-layer:nth-child(4) { backdrop-filter: blur(2px); mask-image: linear-gradient(to bottom, transparent 37%, black 50%); }
      .hero__blur-layer:nth-child(5) { backdrop-filter: blur(3px); mask-image: linear-gradient(to bottom, transparent 50%, black 62%); }
      .hero__blur-layer:nth-child(6) { backdrop-filter: blur(4px); mask-image: linear-gradient(to bottom, transparent 62%, black 75%); }
      .hero__blur-layer:nth-child(7) { backdrop-filter: blur(6px); mask-image: linear-gradient(to bottom, transparent 75%, black 87%); }
      .hero__blur-layer:nth-child(8) { backdrop-filter: blur(8px); mask-image: linear-gradient(to bottom, transparent 87%, black 100%); }

      .hero__blur::after {
        position: absolute;
        inset: 0;
        content: "";
        background: linear-gradient(to bottom, transparent, rgba(20, 20, 20, 0.42) 45%, rgba(20, 20, 20, 0.9));
      }

      .hero__blur-bar {
        position: absolute;
        right: 0;
        bottom: 0;
        left: 0;
        z-index: 4;
        height: calc(60px + clamp(20px, 3vh, 36px) + 24px);
        pointer-events: none;
        background: linear-gradient(0.8deg, rgba(255, 255, 255, 0.06) -51%, transparent 109%), rgba(255, 255, 255, 0.01);
        mask-image: linear-gradient(to bottom, transparent, black 30%);
      }

      .header {
        position: absolute;
        top: 0;
        right: 0;
        left: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px var(--page-pad);
      }

      .logo {
        display: inline-flex;
        align-items: center;
      }

      .logo__icon {
        display: block;
        width: clamp(92px, 8.4vw, 122px);
        height: clamp(23px, 2.08vw, 30px);
        overflow: visible;
      }

      body:not(.is-ready) .logo__circle,
      body:not(.is-ready) .logo__arc,
      body:not(.is-ready) .logo__text-group,
      body:not(.is-ready) .nav-pill,
      body:not(.is-ready) .nav-pill__link,
      body:not(.is-ready) .btn,
      body:not(.is-ready) .side-nav__link-text,
      body:not(.is-ready) .side-nav__line,
      body:not(.is-ready) .about-card,
      body:not(.is-ready) .scroll-down,
      body:not(.is-ready) .hero__char {
        animation-play-state: paused !important;
      }

      .logo__circle {
        transform: scale(0);
        transform-origin: 15px 15px;
        opacity: 0;
        animation: logo-circle 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s forwards;
      }

      .logo__arc {
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        opacity: 0;
        transform: translateX(-14px);
        animation: logo-arc 0.65s cubic-bezier(0.16, 1, 0.3, 1) 0.55s forwards;
      }

      .logo__arc--far { animation-delay: 1.15s; }

      .logo__text-group {
        opacity: 0;
        filter: blur(10px);
        transform: translateX(28px);
        animation: logo-text 1.5s cubic-bezier(0.16, 1, 0.3, 1) 1.1s forwards;
      }

      @keyframes logo-circle { to { transform: scale(1); opacity: 1; } }
      @keyframes logo-arc { to { stroke-dashoffset: 0; opacity: 1; transform: translateX(0); } }
      @keyframes logo-text { to { opacity: 1; filter: blur(0); transform: translateX(0); } }

      .nav-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: clamp(16px, 2.3vw, 33px);
        padding: clamp(8px, 0.76vw, 11px) clamp(13px, 1.39vw, 20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        background: linear-gradient(12deg, rgba(255, 255, 255, 0.06) -43%, transparent 104%), rgba(255, 255, 255, 0.01);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.18);
        backdrop-filter: blur(7px);
        opacity: 0;
        transform: scaleX(0);
        transform-origin: center;
        animation: reveal-pill 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
      }

      @keyframes reveal-pill { to { opacity: 1; transform: scaleX(1); } }

      .nav-pill__link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--text-muted);
        font-size: clamp(12px, 1.06vw, 15px);
        font-weight: 500;
        opacity: 0;
        transform: translateY(14px);
        transition: color 0.2s ease;
        animation: reveal-up 0.65s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .nav-pill__link:hover { color: #fff; }
      .nav-pill__link:nth-child(1) { animation-delay: 0.75s; }
      .nav-pill__link:nth-child(2) { animation-delay: 0.83s; }
      .nav-pill__link:nth-child(3) { animation-delay: 0.91s; }
      .nav-pill__link:nth-child(4) { animation-delay: 0.99s; }

      .nav-pill__badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 18px;
        height: 18px;
        padding: 0 5px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.09);
        color: var(--text-muted);
        font-size: 11px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: clamp(7px, 0.7vw, 10px);
        padding: clamp(8px, 0.76vw, 11px) clamp(18px, 2vw, 29px);
        border-radius: var(--button-radius);
        background: #fff;
        color: #000;
        font-size: clamp(13px, 1.11vw, 16px);
        font-weight: 500;
        opacity: 0;
        transform: scale(0);
        animation: bounce-in 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
      }

      .btn--footer {
        background: #fff;
        color: var(--dark-text);
        animation-delay: 0.7s;
      }

      .btn__arrow { width: 8px; height: 8px; }

      @keyframes bounce-in {
        0% { opacity: 0; transform: scale(0); }
        60% { opacity: 1; transform: scale(1.1); }
        100% { opacity: 1; transform: scale(1); }
      }

      .hero__heading {
        position: absolute;
        top: 24%;
        left: var(--page-pad);
        z-index: 5;
        width: clamp(520px, 64vw, 960px);
        font-size: clamp(48px, 5.35vw, 82px);
        font-weight: 500;
        letter-spacing: -0.035em;
        line-height: 1.02;
      }

      .hero__line {
        display: block;
        overflow: hidden;
        line-height: 1.1;
      }

      .hero__line-inner {
        display: inline-block;
        white-space: nowrap;
      }

      .hero__heading em {
        font-weight: 700;
        font-style: italic;
      }

      .hero__char {
        display: inline-block;
        opacity: 0;
        transform: translateY(110%);
        animation: char-reveal 0.65s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes char-reveal { to { opacity: 1; transform: translateY(0); } }
      @keyframes reveal-up { to { opacity: 1; transform: translateY(0); } }

      .side-nav {
        position: absolute;
        top: 53%;
        right: var(--page-pad);
        z-index: 5;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: clamp(10px, 1.1vw, 16px);
        transform: translateY(-50%);
      }

      .side-nav__link {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: rgba(255, 255, 255, 0.82);
        font-size: clamp(13px, 1.1vw, 16px);
        font-weight: 500;
        transition: color 0.2s ease;
      }

      .side-nav__link:hover,
      .side-nav__link--active { color: #fff; }

      .side-nav__link-text {
        display: inline-block;
        opacity: 0;
        transform: translateY(14px);
        animation: reveal-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .side-nav__link:nth-child(1) .side-nav__link-text { animation-delay: 0.5s; }
      .side-nav__link:nth-child(2) .side-nav__link-text { animation-delay: 0.7s; }
      .side-nav__link:nth-child(3) .side-nav__link-text { animation-delay: 0.9s; }
      .side-nav__link:nth-child(4) .side-nav__link-text { animation-delay: 1.1s; }
      .side-nav__link:nth-child(5) .side-nav__link-text { animation-delay: 1.3s; }

      .side-nav__line {
        display: inline-block;
        width: 14px;
        height: 1px;
        background: #fff;
        opacity: 0;
        animation: reveal-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
      }

      .hero__bottom {
        position: absolute;
        right: var(--page-pad);
        bottom: 0;
        left: var(--page-pad);
        z-index: 5;
        display: grid;
        grid-template-columns: 1fr auto;
        grid-template-rows: auto auto auto;
        align-items: end;
        gap: clamp(6px, 0.7vw, 10px) clamp(20px, 2.8vw, 40px);
        padding-bottom: clamp(20px, 3vh, 36px);
      }

      .hero__label {
        grid-row: 1;
        grid-column: 1;
        font-size: clamp(14px, 1.25vw, 18px);
        font-weight: 500;
      }

      .hero__desc {
        grid-row: 2;
        grid-column: 1;
        max-width: clamp(340px, 36vw, 520px);
        color: var(--text-soft);
        font-size: clamp(13px, 1.1vw, 17px);
        line-height: 1.5;
      }

      .hero__actions {
        grid-row: 3;
        grid-column: 1;
        display: flex;
        align-items: center;
        gap: clamp(14px, 1.67vw, 24px);
      }

      .scroll-down {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        opacity: 0;
        transform: scale(0);
        animation: bounce-in 0.9s cubic-bezier(0.16, 1, 0.3, 1) 1.4s forwards;
      }

      .scroll-down__text {
        color: rgba(255, 255, 255, 0.88);
        font-size: clamp(14px, 1.25vw, 18px);
        font-weight: 700;
      }

      .scroll-down__circle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 26px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        transition: border-color 0.2s ease;
      }

      .scroll-down:hover .scroll-down__circle { border-color: #fff; }
      .scroll-down__circle svg { width: 8px; height: 9px; animation: arrow-scroll 2.5s cubic-bezier(0.4, 0, 0.7, 1) infinite; }

      @keyframes arrow-scroll {
        0%, 100% { opacity: 1; transform: translateY(0); }
        38% { opacity: 0; transform: translateY(9px); }
        39% { opacity: 0; transform: translateY(-9px); }
        60% { opacity: 1; transform: translateY(0); }
      }

      .about-card {
        grid-row: 1 / span 3;
        grid-column: 2;
        align-self: end;
        display: flex;
        width: clamp(292px, 26.5vw, 390px);
        overflow: hidden;
        border-radius: var(--card-radius);
        background: #fff;
        opacity: 0;
        transform: scale(0);
        transition: box-shadow 0.25s ease;
        animation: bounce-in-card 0.9s cubic-bezier(0.16, 1, 0.3, 1) 1.2s forwards;
      }

      @keyframes bounce-in-card {
        0% { opacity: 0; transform: scale(0); }
        60% { opacity: 1; transform: scale(1.04); }
        100% { opacity: 1; transform: scale(1); }
      }

      .about-card:hover { box-shadow: 0 10px 34px rgba(0, 0, 0, 0.24); }

      .about-card__image {
        width: clamp(134px, 14vw, 190px);
        flex: 0 0 auto;
        padding: 7px;
      }

      .about-card__image img {
        width: 100%;
        height: 100%;
        border-radius: var(--card-radius);
        object-fit: cover;
      }

      .about-card__content {
        display: flex;
        flex: 1;
        flex-direction: column;
        justify-content: space-between;
        padding: clamp(14px, 1.32vw, 19px) clamp(12px, 1.1vw, 16px) clamp(12px, 1.1vw, 16px) 7px;
      }

      .about-card__title {
        margin-bottom: 6px;
        color: #000;
        font-size: clamp(12px, 0.97vw, 14px);
        font-weight: 700;
      }

      .about-card__text {
        color: rgba(0, 0, 0, 0.6);
        font-size: clamp(10px, 0.83vw, 12px);
        line-height: 1.45;
      }

      .about-card__arrow {
        align-self: flex-end;
        width: clamp(50px, 5.35vw, 77px);
        height: 13px;
        color: rgba(0, 0, 0, 0.24);
        transition: color 0.2s ease, transform 0.2s ease;
      }

      .about-card:hover .about-card__arrow { color: rgba(0, 0, 0, 0.7); transform: translateX(3px); }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @media (max-width: 1360px) {
        .hero__heading { top: 21%; }
      }

      @media (max-width: 1200px) {
        .header { padding-top: 16px; padding-bottom: 16px; }
        .hero__heading { top: 19%; }
        .side-nav { top: 50%; }
      }

      @media (max-width: 1100px) {
        .hero__heading { top: 17%; }
        .hero__blur { height: 31%; }
      }

      @media (prefers-reduced-motion: reduce) {
        html { scroll-behavior: auto; }
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-delay: 0ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>

    <script>
      (() => {
        const hero = document.querySelector(".hero");
        const video = document.querySelector(".hero__video");
        const scrollDown = document.getElementById("scrollDown");
        const CHAR_STEP = 0.038;
        let started = false;

        const animateLines = (selector, baseDelay, lineGap) => {
          document.querySelectorAll(selector).forEach((line, lineIndex) => {
            let charCount = 0;
            const walker = document.createTreeWalker(line, NodeFilter.SHOW_TEXT);
            const textNodes = [];
            while (walker.nextNode()) textNodes.push(walker.currentNode);

            textNodes.forEach((node) => {
              const fragment = document.createDocumentFragment();
              Array.from(node.textContent || "").forEach((char) => {
                if (/\s/.test(char)) {
                  fragment.appendChild(document.createTextNode(char));
                  return;
                }
                const span = document.createElement("span");
                span.className = "hero__char";
                span.textContent = char;
                span.style.animationDelay = `${baseDelay + lineIndex * lineGap + charCount * CHAR_STEP}s`;
                fragment.appendChild(span);
                charCount += 1;
              });
              node.replaceWith(fragment);
            });
          });
        };

        const startAnimations = () => {
          if (started) return;
          started = true;
          animateLines(".hero__heading .hero__line-inner", 0.3, 0.85);
          animateLines(".hero__label .hero__line-inner", 0.3, 0.65);
          animateLines(".hero__desc .hero__line-inner", 0.3, 0.65);
          requestAnimationFrame(() => document.body.classList.add("is-ready"));
        };

        const rewindVideo = () => {
          if (!video || video.currentTime < 10) return;
          video.currentTime = 0;
          video.play().catch(() => {});
        };

        const openProject = () => window.open("https://github.com/mcxen/qx", "_blank", "noopener,noreferrer");
        scrollDown?.addEventListener("click", openProject);
        video?.addEventListener("timeupdate", rewindVideo);
        video?.addEventListener("canplaythrough", startAnimations, { once: true });
        video?.play().catch(() => {});
        if (video && video.readyState >= 4) startAnimations();
        const fallback = window.setTimeout(startAnimations, 5000);

        hero?.querySelectorAll('a[href^="#"]').forEach((link) => {
          link.addEventListener("click", (event) => {
            const target = document.querySelector(link.getAttribute("href"));
            if (!target) return;
            event.preventDefault();
            window.scrollTo({ top: target.getBoundingClientRect().top + window.scrollY, behavior: "smooth" });
          });
        });

        window.addEventListener("pagehide", () => {
          window.clearTimeout(fallback);
          document.body.classList.remove("is-ready");
        }, { once: true });
      })();
    </script>
