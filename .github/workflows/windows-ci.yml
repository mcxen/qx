name: Windows Compatibility

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-windows:
    name: Check Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: windows-x64-check

      - name: Install frontend dependencies
        run: npm ci

      - name: Check frontend
        run: npm run build

      - name: Check Rust formatting
        run: cargo fmt --check --manifest-path src-tauri/Cargo.toml

      - name: Check Windows Rust target
        run: cargo check --manifest-path src-tauri/Cargo.toml --target x86_64-pc-windows-msvc

      - name: Build Windows NSIS installer
        run: npm run tauri -- build --target x86_64-pc-windows-msvc --bundles nsis

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: qx-windows-x64-ci
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error
