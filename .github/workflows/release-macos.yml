name: Release macOS

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        type: string
      release_name:
        description: Release title
        required: false
        type: string
      prerelease:
        description: Mark as a prerelease
        required: false
        default: false
        type: boolean

env:
  RELEASE_REPOSITORY: mcxen/qx-releases

jobs:
  build-macos:
    name: Build macOS (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: macos-x64
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundle
        run: npm run tauri -- build --target ${{ matrix.target }} --bundles app

      - name: Archive app bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/qx.app \
            qx_${{ inputs.tag }}_${{ matrix.target }}.app.zip

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: qx-${{ matrix.artifact }}
          path: |
            qx_${{ inputs.tag }}_${{ matrix.target }}.app.zip
          if-no-files-found: error

  publish-release:
    name: Publish release repository
    needs: build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Download bundles
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_NAME: ${{ inputs.release_name || inputs.tag }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "Missing RELEASE_TOKEN secret with access to ${RELEASE_REPOSITORY}."
            exit 1
          fi

          args=(
            release
            create "${RELEASE_TAG}"
            release-assets/*.zip
            --repo "${RELEASE_REPOSITORY}"
            --title "${RELEASE_NAME}"
            --notes "macOS release built from ${GITHUB_REPOSITORY}@${GITHUB_SHA}."
          )

          if [ "${PRERELEASE}" = "true" ]; then
            args+=(--prerelease)
          fi

          gh "${args[@]}"
