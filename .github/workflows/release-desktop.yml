name: Release Desktop Clients

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        type: string
      prerelease:
        description: Mark as a prerelease
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            artifact: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            bundles: app
          - label: Windows x64
            artifact: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout first-party plugin catalog
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/qx-plugins
          path: qx-plugins-clone

      - name: Resolve release tag
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag }}" >> "${GITHUB_ENV}"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "${GITHUB_ENV}"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Check architecture and plugin ports
        run: npm run check

      - name: Prepare bundled search tools
        run: npm run prepare:search-tools

      - name: Build Tauri bundle
        env:
          QX_UPDATE_MIRROR_MANIFEST_URL: ${{ vars.QX_UPDATE_MIRROR_MANIFEST_URL }}
        run: npm run tauri -- build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Ad-hoc sign macOS app bundle (no Apple paid cert)
        if: runner.os == 'macOS'
        run: |
          # Free local identity (`-`). Not notarized; first open may need
          # right-click → Open. In-app helper re-signs its own copy the same way.
          codesign --force --deep --sign - \
            --timestamp=none \
            --identifier "com.mcx.qx" \
            --entitlements src-tauri/entitlements.plist \
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/Qx.app
          codesign --verify --deep --strict \
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/Qx.app
          # Strip quarantine if CI/tools attached it before zip.
          xattr -cr src-tauri/target/${{ matrix.target }}/release/bundle/macos/Qx.app || true

      - name: Archive macOS app bundle
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/Qx.app \
            qx_${RELEASE_TAG}_${{ matrix.target }}.app.zip

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: qx-${{ matrix.artifact }}
          path: |
            qx_*.app.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: error

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag }}" >> "${GITHUB_ENV}"
            echo "PRERELEASE=${{ inputs.prerelease }}" >> "${GITHUB_ENV}"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "${GITHUB_ENV}"
            echo "PRERELEASE=false" >> "${GITHUB_ENV}"
          fi

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten release assets
        shell: bash
        run: |
          find release-assets -type f -print0 | while IFS= read -r -d '' asset; do
            target="release-assets/$(basename "$asset")"
            if [ "$asset" != "$target" ]; then
              if [ -e "$target" ]; then
                echo "Duplicate release asset: $(basename "$asset")" >&2
                exit 1
              fi
              mv "$asset" "$target"
            fi
          done
          find release-assets -mindepth 1 -type d -empty -delete

      - name: List release assets
        run: find release-assets -type f -maxdepth 2 -print

      - name: Prepare updater manifest
        shell: bash
        run: |
          ZIP=$(ls release-assets/*_aarch64-apple-darwin.app.zip 2>/dev/null | head -1)
          WINDOWS_INSTALLER=$(ls release-assets/*setup.exe 2>/dev/null | head -1)
          if [ -z "$ZIP" ]; then
            echo "No ARM64 app.zip found; updater manifest cannot be published" >&2
            exit 1
          fi
          if [ -z "$WINDOWS_INSTALLER" ]; then
            echo "No Windows NSIS installer found; updater manifest cannot be published" >&2
            exit 1
          fi
          ZIP_NAME=$(basename "$ZIP")
          WINDOWS_NAME=$(basename "$WINDOWS_INSTALLER")
          SHA256_ARM=$(shasum -a 256 "$ZIP" | cut -d' ' -f1)
          SHA256_WINDOWS=$(shasum -a 256 "$WINDOWS_INSTALLER" | cut -d' ' -f1)
          SIZE_ARM=$(wc -c < "$ZIP" | tr -d ' ')
          SIZE_WINDOWS=$(wc -c < "$WINDOWS_INSTALLER" | tr -d ' ')
          ASSET_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${ZIP_NAME}"
          WINDOWS_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${WINDOWS_NAME}"
          cat > release-assets/latest.json <<EOF
          {
            "version": "${RELEASE_TAG#v}",
            "tag": "${RELEASE_TAG}",
            "platform": "macos",
            "target": "aarch64-apple-darwin",
            "asset_name": "${ZIP_NAME}",
            "asset_url": "${ASSET_URL}",
            "sha256": "${SHA256_ARM}",
            "size": ${SIZE_ARM},
            "artifacts": [
              {
                "platform": "macos",
                "target": "aarch64-apple-darwin",
                "asset_name": "${ZIP_NAME}",
                "asset_url": "${ASSET_URL}",
                "sha256": "${SHA256_ARM}",
                "size": ${SIZE_ARM}
              },
              {
                "platform": "windows",
                "target": "x86_64-pc-windows-msvc",
                "asset_name": "${WINDOWS_NAME}",
                "asset_url": "${WINDOWS_URL}",
                "sha256": "${SHA256_WINDOWS}",
                "size": ${SIZE_WINDOWS}
              }
            ]
          }
          EOF

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" release-assets/* --clobber
            exit 0
          fi

          gh release create "${RELEASE_TAG}" release-assets/* \
            --title "${RELEASE_TAG}" \
            --notes "Desktop clients built from ${GITHUB_REPOSITORY}@${GITHUB_SHA}." \
            $([ "${PRERELEASE}" = "true" ] && echo "--prerelease" || echo "")

      - name: Mirror release to WebDAV
        shell: bash
        env:
          WEBDAV_UPLOAD_BASE: ${{ secrets.WEBDAV_UPLOAD_BASE }}
          WEBDAV_USERNAME: ${{ secrets.WEBDAV_USERNAME }}
          WEBDAV_PASSWORD: ${{ secrets.WEBDAV_PASSWORD }}
          QX_UPDATE_MIRROR_MANIFEST_URL: ${{ vars.QX_UPDATE_MIRROR_MANIFEST_URL }}
        run: |
          set -euo pipefail

          if [ -z "${WEBDAV_UPLOAD_BASE}" ] \
            && [ -z "${WEBDAV_USERNAME}" ] \
            && [ -z "${WEBDAV_PASSWORD}" ] \
            && [ -z "${QX_UPDATE_MIRROR_MANIFEST_URL}" ]; then
            echo "WebDAV mirror is not configured; skipping mirror upload."
            exit 0
          fi

          if [ -z "${WEBDAV_UPLOAD_BASE}" ] \
            || [ -z "${WEBDAV_USERNAME}" ] \
            || [ -z "${WEBDAV_PASSWORD}" ] \
            || [ -z "${QX_UPDATE_MIRROR_MANIFEST_URL}" ]; then
            echo "WebDAV mirror configuration is incomplete." >&2
            exit 1
          fi

          case "${WEBDAV_UPLOAD_BASE}" in
            https://*) ;;
            *)
              echo "WEBDAV_UPLOAD_BASE must use HTTPS." >&2
              exit 1
              ;;
          esac
          case "${QX_UPDATE_MIRROR_MANIFEST_URL}" in
            https://*/latest.json) ;;
            *)
              echo "QX_UPDATE_MIRROR_MANIFEST_URL must be an HTTPS URL ending in /latest.json." >&2
              exit 1
              ;;
          esac

          UPLOAD_BASE="${WEBDAV_UPLOAD_BASE%/}"
          PUBLIC_ROOT="${QX_UPDATE_MIRROR_MANIFEST_URL%/latest.json}"
          PUBLIC_RELEASE_BASE="${PUBLIC_ROOT}/releases"

          MKCOL_STATUS=$(curl --silent --show-error \
            --output /dev/null \
            --write-out "%{http_code}" \
            --user "${WEBDAV_USERNAME}:${WEBDAV_PASSWORD}" \
            --request MKCOL \
            "${UPLOAD_BASE}/releases")
          case "${MKCOL_STATUS}" in
            200|201|204|405) ;;
            *)
              echo "Unable to prepare WebDAV releases collection (HTTP ${MKCOL_STATUS})." >&2
              exit 1
              ;;
          esac

          upload_webdav() {
            local source="$1"
            local destination="$2"
            curl --fail-with-body --retry 3 --retry-all-errors \
              --user "${WEBDAV_USERNAME}:${WEBDAV_PASSWORD}" \
              --upload-file "${source}" \
              "${destination}"
          }

          for ASSET in \
            release-assets/*_aarch64-apple-darwin.app.zip \
            release-assets/*setup.exe
          do
            ASSET_NAME=$(basename "${ASSET}")
            upload_webdav "${ASSET}" "${UPLOAD_BASE}/releases/${ASSET_NAME}"
          done

          jq --arg base "${PUBLIC_RELEASE_BASE}" '
            .asset_url = ($base + "/" + .asset_name)
            | .artifacts |= map(.asset_url = ($base + "/" + .asset_name))
          ' release-assets/latest.json > release-assets/latest-webdav.json

          upload_webdav \
            release-assets/latest-webdav.json \
            "${UPLOAD_BASE}/releases/${RELEASE_TAG}.json"

          if [ "${PRERELEASE}" = "true" ]; then
            echo "Prerelease mirrored without replacing the stable latest.json."
            exit 0
          fi

          # Publish the stable pointer only after every versioned asset exists.
          upload_webdav \
            release-assets/latest-webdav.json \
            "${UPLOAD_BASE}/latest.json"

          curl --fail --silent --show-error --retry 5 --retry-all-errors \
            "${QX_UPDATE_MIRROR_MANIFEST_URL}" \
            | jq --exit-status --arg version "${RELEASE_TAG#v}" \
              '.version == $version and (.artifacts | length) == 2' >/dev/null

      - name: Compute SHA256 and notify Homebrew tap
        env:
          GH_TOKEN: ${{ github.token }}
          HOMEBREW_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
        run: |
          # Find the ARM64 app.zip artifact
          ZIP=$(ls release-assets/*_aarch64-apple-darwin.app.zip 2>/dev/null | head -1)
          if [ -z "$ZIP" ]; then
            echo "No ARM64 app.zip found, skipping homebrew update"
            exit 0
          fi
          SHA256_ARM=$(shasum -a 256 "$ZIP" | cut -d' ' -f1)
          echo "SHA256 (arm): $SHA256_ARM"

          # Dispatch to homebrew-qx repo
          if [ -n "$HOMEBREW_PAT" ]; then
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${HOMEBREW_PAT}" \
              /repos/mcxen/homebrew-qx/dispatches \
              -f "event_type=qx-release" \
              -f "client_payload[version]=${RELEASE_TAG#v}" \
              -f "client_payload[sha256_arm]=${SHA256_ARM}"
            echo "Dispatched to mcxen/homebrew-qx"
          else
            echo "HOMEBREW_TAP_PAT not set, skipping dispatch"
          fi
