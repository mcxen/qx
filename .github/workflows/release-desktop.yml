name: Release Desktop Clients

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        type: string
      prerelease:
        description: Mark as a prerelease
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            artifact: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            bundles: app,dmg
          - label: Windows x64
            artifact: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag }}" >> "${GITHUB_ENV}"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "${GITHUB_ENV}"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare bundled search tools
        run: npm run prepare:search-tools

      - name: Build Tauri bundle
        run: npm run tauri -- build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Archive macOS app bundle
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/qx.app \
            qx_${RELEASE_TAG}_${{ matrix.target }}.app.zip

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: qx-${{ matrix.artifact }}
          path: |
            qx_*.app.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
          if-no-files-found: warn

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag }}" >> "${GITHUB_ENV}"
            echo "PRERELEASE=${{ inputs.prerelease }}" >> "${GITHUB_ENV}"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "${GITHUB_ENV}"
            echo "PRERELEASE=false" >> "${GITHUB_ENV}"
          fi

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -type f -maxdepth 2 -print

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" release-assets/* --clobber
            exit 0
          fi

          gh release create "${RELEASE_TAG}" release-assets/* \
            --title "${RELEASE_TAG}" \
            --notes "Desktop clients built from ${GITHUB_REPOSITORY}@${GITHUB_SHA}." \
            $([ "${PRERELEASE}" = "true" ] && echo "--prerelease" || echo "")

      - name: Compute SHA256 and notify Homebrew tap
        env:
          GH_TOKEN: ${{ github.token }}
          HOMEBREW_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
        run: |
          # Find the ARM64 app.zip artifact
          ZIP=$(ls release-assets/*_aarch64-apple-darwin.app.zip 2>/dev/null | head -1)
          if [ -z "$ZIP" ]; then
            echo "No ARM64 app.zip found, skipping homebrew update"
            exit 0
          fi
          SHA256_ARM=$(shasum -a 256 "$ZIP" | cut -d' ' -f1)
          echo "SHA256 (arm): $SHA256_ARM"

          # Dispatch to homebrew-qx repo
          if [ -n "$HOMEBREW_PAT" ]; then
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${HOMEBREW_PAT}" \
              /repos/mcxen/homebrew-qx/dispatches \
              -f "event_type=qx-release" \
              -f "client_payload[version]=${RELEASE_TAG#v}" \
              -f "client_payload[sha256_arm]=${SHA256_ARM}"
            echo "Dispatched to mcxen/homebrew-qx"
          else
            echo "HOMEBREW_TAP_PAT not set, skipping dispatch"
          fi
