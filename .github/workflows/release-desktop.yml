name: Release Desktop Clients

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        type: string
      prerelease:
        description: Mark as a prerelease
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            artifact: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            bundles: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag }}" >> "${GITHUB_ENV}"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "${GITHUB_ENV}"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundle
        run: npm run tauri -- build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Archive macOS app bundle
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/qx.app \
            qx_${RELEASE_TAG}_${{ matrix.target }}.app.zip

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: qx-${{ matrix.artifact }}
          path: |
            qx_*.app.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: warn

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag }}" >> "${GITHUB_ENV}"
            echo "PRERELEASE=${{ inputs.prerelease }}" >> "${GITHUB_ENV}"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "${GITHUB_ENV}"
            echo "PRERELEASE=false" >> "${GITHUB_ENV}"
          fi

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -type f -maxdepth 2 -print

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" release-assets/* --clobber
            exit 0
          fi

          gh release create "${RELEASE_TAG}" release-assets/* \
            --title "${RELEASE_TAG}" \
            --notes "Desktop clients built from ${GITHUB_REPOSITORY}@${GITHUB_SHA}." \
            $([ "${PRERELEASE}" = "true" ] && echo "--prerelease" || echo "")
