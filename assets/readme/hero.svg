<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Qx — keyboard-first desktop launcher for macOS and Windows</title>
  <desc id="desc">Summon with a global hotkey. Search apps, clipboard, RSS, AI, and plugins in one floating panel.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0d12"/>
      <stop offset="55%" stop-color="#12151c"/>
      <stop offset="100%" stop-color="#0a101c"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1f2b" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#141820" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <!-- subtle grid -->
  <g opacity="0.08" stroke="#94a3b8" stroke-width="1">
    <path d="M0 90 H1200 M0 180 H1200 M0 270 H1200"/>
    <path d="M200 0 V360 M400 0 V360 M600 0 V360 M800 0 V360 M1000 0 V360"/>
  </g>
  <circle cx="980" cy="70" r="120" fill="#2563eb" opacity="0.12"/>
  <circle cx="1080" cy="300" r="90" fill="#60a5fa" opacity="0.08"/>

  <!-- left: title -->
  <g transform="translate(56 48)">
    <rect x="0" y="0" width="168" height="28" rx="14" fill="#1e293b" stroke="#334155"/>
    <text x="84" y="19" text-anchor="middle" fill="#93c5fd" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="12" font-weight="600" letter-spacing="0.08em">DESKTOP LAUNCHER</text>

    <text x="0" y="96" fill="#f8fafc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="72" font-weight="700" letter-spacing="-0.03em">Qx</text>

    <text x="0" y="142" fill="#cbd5e1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="20" font-weight="500">Summon. Search. Act.</text>
    <text x="0" y="172" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="16">A Raycast-style floating panel for macOS &amp; Windows —</text>
    <text x="0" y="196" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="16">apps, clipboard, RSS, AI, plugins, all keyboard-first.</text>

    <g transform="translate(0 230)">
      <rect width="150" height="36" rx="10" fill="#0f172a" stroke="#334155"/>
      <text x="75" y="23" text-anchor="middle" fill="#e2e8f0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">⌥ Space</text>
      <text x="168" y="23" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13">toggle launcher · v0.5.12</text>
    </g>
  </g>

  <!-- right: mini shell proof -->
  <g transform="translate(620 42)" filter="url(#soft)">
    <rect width="520" height="276" rx="18" fill="url(#panel)" stroke="#2a3344"/>
    <!-- topbar -->
    <rect x="14" y="14" width="492" height="44" rx="12" fill="#0f141d" stroke="#2a3344"/>
    <circle cx="36" cy="36" r="7" fill="#3b82f6" opacity="0.9"/>
    <rect x="52" y="28" width="280" height="16" rx="8" fill="#1e293b"/>
    <rect x="52" y="28" width="92" height="16" rx="8" fill="url(#accent)" opacity="0.35"/>
    <text x="64" y="40" fill="#93c5fd" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11">clash</text>
    <rect x="420" y="26" width="70" height="20" rx="8" fill="#1e293b" stroke="#334155"/>
    <text x="455" y="40" text-anchor="middle" fill="#94a3b8" font-family="-apple-system, sans-serif" font-size="10">All ▾</text>

    <!-- results -->
    <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">
      <rect x="14" y="70" width="320" height="36" rx="8" fill="#1d4ed8" opacity="0.22" stroke="#3b82f6" stroke-opacity="0.35"/>
      <circle cx="34" cy="88" r="8" fill="#60a5fa"/>
      <text x="50" y="92" fill="#f1f5f9" font-weight="600">Clash Verge</text>
      <text x="300" y="92" text-anchor="end" fill="#64748b" font-size="10">App</text>

      <rect x="14" y="112" width="320" height="32" rx="8" fill="transparent"/>
      <circle cx="34" cy="128" r="8" fill="#334155"/>
      <text x="50" y="132" fill="#cbd5e1">Clipboard History</text>
      <text x="300" y="132" text-anchor="end" fill="#64748b" font-size="10">Module</text>

      <rect x="14" y="148" width="320" height="32" rx="8" fill="transparent"/>
      <circle cx="34" cy="164" r="8" fill="#334155"/>
      <text x="50" y="168" fill="#cbd5e1">RSS Reader</text>
      <text x="300" y="168" text-anchor="end" fill="#64748b" font-size="10">Module</text>

      <rect x="14" y="184" width="320" height="32" rx="8" fill="transparent"/>
      <circle cx="34" cy="200" r="8" fill="#334155"/>
      <text x="50" y="204" fill="#cbd5e1">QxAI · chat</text>
      <text x="300" y="204" text-anchor="end" fill="#64748b" font-size="10">AI</text>
    </g>

    <!-- context -->
    <rect x="348" y="70" width="158" height="146" rx="12" fill="#0f141d" stroke="#2a3344"/>
    <text x="364" y="94" fill="#64748b" font-family="-apple-system, sans-serif" font-size="10" letter-spacing="0.06em">QUICK ENTRIES</text>
    <rect x="364" y="108" width="126" height="28" rx="8" fill="#1e293b"/>
    <text x="376" y="126" fill="#e2e8f0" font-family="-apple-system, sans-serif" font-size="11">Clipboard</text>
    <rect x="364" y="144" width="126" height="28" rx="8" fill="#1e293b"/>
    <text x="376" y="162" fill="#e2e8f0" font-family="-apple-system, sans-serif" font-size="11">RSS</text>
    <rect x="364" y="180" width="126" height="28" rx="8" fill="#1e293b"/>
    <text x="376" y="198" fill="#e2e8f0" font-family="-apple-system, sans-serif" font-size="11">Settings</text>

    <!-- bottom island -->
    <rect x="14" y="232" width="492" height="30" rx="10" fill="#0f141d" stroke="#2a3344"/>
    <text x="30" y="251" fill="#64748b" font-family="ui-monospace, Menlo, monospace" font-size="10">Esc</text>
    <rect x="190" y="239" width="140" height="16" rx="8" fill="#1e293b"/>
    <text x="260" y="251" text-anchor="middle" fill="#93c5fd" font-family="-apple-system, sans-serif" font-size="10">10 results ready</text>
    <rect x="420" y="238" width="72" height="18" rx="6" fill="url(#accent)"/>
    <text x="456" y="251" text-anchor="middle" fill="#0f172a" font-family="-apple-system, sans-serif" font-size="10" font-weight="700">Open ↵</text>
  </g>
</svg>
